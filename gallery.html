<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레드향 - 전공 탐구 (갤러리)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
    <link rel="stylesheet" href="./style.css">
    <style>
        /* 영수증 박스 및 버튼 스타일 (공통) */
        .order-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Jua', sans-serif;
        }

        /* 로그인 박스 스타일 추가 */
        #login-box {
            background-color: #f9f9f9;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #ddd;
            max-width: 400px;
            margin: 50px auto;
        }
        #loginName, #userPw, #newPw {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 150px;
            margin-bottom: 10px;
        }
        #settings button {
            padding: 8px 15px;
            margin-right: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
            background-color: #f0f0f0;
            font-family: 'Jua', sans-serif;
        }
        #settings button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <header>
        <h1>
            <span class="material-symbols-outlined">agriculture</span>
            세상이 널 버렸다 생각하지 마라 세상은 널 가진 적이 없다
            <span class="material-symbols-outlined">sprinkler</span>
        </h1>
    </header>

    <nav>
       <a href="index.html">홈으로</a> |
       <a href="subject.html">전공 탐구</a>|
       <a href="gallery.html">갤러리</a>
    </nav>

    <main>
        <div id="login-box" style="text-align: center;">
            <h2>🔒 시스템 인증이 필요합니다</h2>
            <p>갤러리를 보려면 아이디와 암호를 입력하세요.</p>
            <input type="text" id="loginName" placeholder="아이디 입력" /><br>
            <input type="password" id="userPw" placeholder="암호 입력" onkeypress="if(event.keyCode==13) checkLogin();" /><br>
            <button class="order-btn" onclick="checkLogin()">입장하기</button>
        </div>

        <div id="secret-area" style="display: none;">
            
            <h3 style="color: #2e7d32; text-align: center;">👋 <span id="user-display"></span>님, 갤러리에 오신 것을 환영합니다!</h3>

            <div class="display-box">
                <img id="targetImg" src="./새 폴더/244546_145056_5824.jpg" style="width: 100%; max-width:500px;" alt="레드향사진">
                <p id="targetDesc">레드향</p>
            </div>
            
            <div class="thumb-list">
                <img src="./새 폴더/244546_145056_5824.jpg"
                     onclick="show('./새 폴더/244546_145056_5824.jpg', '레드향!')" />
                <img src="./새 폴더/315973_50187_2350.jpg"
                     onclick="show('./새 폴더/315973_50187_2350.jpg', '레드향 할아버지')" />
                <img src="./새 폴더/Q_80,850.jpg"
                     onclick="show('./새 폴더/Q_80,850.jpg', '제주도 레드향')" />
                <img src="새 폴더/hqdefault.jpg"
                     onclick="show('새 폴더/hqdefault.jpg', '레드향 천헤향 황금향')" />
                <img src="./새 폴더/1000000043_detail_063.jpg"
                     onclick="show('./새 폴더/1000000043_detail_063.jpg', '자른 레드향')" />
                <img src="./새 폴더/902.jpg"
                     onclick="show('./새 폴더/902.jpg', '선물용 레드향')" />
                <img src="./새 폴더/903.jpg"
                     onclick="show('./새 폴더/903.jpg', '손질된 레드향')" />
                <img src="./새 폴더/904.jpg"
                     onclick="show('./새 폴더/904.jpg', '덜익은 레드향')" />
                <img src="./새 폴더/905.jpg"
                     onclick="show('./새 폴더/905.jpg', '레드향의 재배현장')" />
                <img src="./새 폴더/906.jpeg"
                     onclick="show('./새 폴더/906.jpeg', '청주에서 나고 기른 레드향(청주향)')" />



            </div>

            <hr>
            <div id="settings" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; background: #fff;">
                <h4>🔑 시스템 보안 설정</h4>
                <p style="font-size: 0.9em; color: #666;">보안을 위해 정기적으로 비밀번호를 변경해 주세요.</p>
                <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
                <button onclick="changePassword()">비밀번호 변경</button>
                <button onclick="logout()">로그아웃</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 박은호 문의:aceace0708@gmail.com</p>
    </footer>

    <script>
        // --- 로그인 및 보안 관련 스크립트 ---
        
        window.onload = function() {
            let isLoggedIn = localStorage.getItem("isLoggedIn");
            let savedName = localStorage.getItem("savedName");

            if (isLoggedIn === "true") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
                document.getElementById("user-display").innerText = savedName;
            }
        };

        function checkLogin() {
            let name = document.getElementById("loginName").value;
            let pw = document.getElementById("userPw").value;
            let currentPw = localStorage.getItem("userPassword") || "1211";

            if (pw === currentPw && name !== "") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("savedName", name);
                localStorage.setItem("userPassword", currentPw);

                alert(name + "님, 인증 정보가 저장소에 기록되었습니다.");

                document.getElementById("login-box").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
                document.getElementById("user-display").innerText = name;
            } else {
                alert("아이디 또는 암호가 틀렸습니다.");
            }
        }

        function changePassword() {
            let newPw = document.getElementById("newPw").value;
            if (newPw.length < 4) { 
                alert("암호는 4자리 이상이어야 합니다."); 
                return; 
            }
            localStorage.setItem("userPassword", newPw);
            alert("비밀번호가 변경되었습니다.");
            document.getElementById("newPw").value = ""; 
        }

        function logout() {
            if (confirm("로그아웃 하시겠습니까?")) {
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("savedName");
                location.href = "index.html";
            }
        }

        // --- 갤러리 이미지 변경 스크립트 ---
        
        function show(imgPath, text) {
            document.getElementById("targetImg").src = imgPath;
            document.getElementById("targetDesc").innerText = text;
        }
    </script>
</body>
</html>
